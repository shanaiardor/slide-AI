<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Slide Ask AI</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <main class="app">
      <form id="settings-form" class="panel form-panel">
        <p class="label">AI 配置</p>

        <label class="field">
          <span>系统提示词</span>
          <div class="prompt-editor-shell">
            <textarea
              id="system-prompt"
              class="prompt-editor-input"
              rows="5"
              data-placeholder="告诉 AI 应该如何回答，例如：你正在阅读《{title}》，当前页面域名是 {domain}。"
              placeholder="告诉 AI 应该如何回答，例如：你正在阅读《{title}》，当前页面域名是 {domain}。"
            ></textarea>
            <div id="prompt-suggestions" class="prompt-suggestions" hidden></div>
          </div>
          <div class="prompt-keywords">
            <div class="keyword-chips">
              <button class="keyword-chip" type="button" data-token="{title}"><code>{title}</code> 页面标题</button>
              <button class="keyword-chip" type="button" data-token="{url}"><code>{url}</code> 页面完整地址</button>
              <button class="keyword-chip" type="button" data-token="{origin}"><code>{origin}</code> 页面来源</button>
              <button class="keyword-chip" type="button" data-token="{domain}"><code>{domain}</code> 页面域名</button>
              <button class="keyword-chip" type="button" data-token="{pathname}"><code>{pathname}</code> 页面路径</button>
              <button class="keyword-chip" type="button" data-token="{language}"><code>{language}</code> 页面语言</button>
              <button class="keyword-chip" type="button" data-token="{selected_text}"><code>{selected_text}</code> 当前选中文本</button>
            </div>
          </div>
        </label>

        <section class="api-config-card">
          <button
            id="api-config-toggle"
            class="api-config-toggle"
            type="button"
            aria-expanded="true"
            aria-controls="api-config-fields"
          >
            <span class="api-config-copy">
              <span class="api-config-title">连接配置</span>
              <span id="api-config-summary" class="api-config-summary">首次使用时需要填写 API Key。</span>
            </span>
            <span id="api-config-badge" class="api-config-badge">未配置</span>
          </button>

          <div id="api-config-fields" class="api-config-fields">
            <label class="field">
              <span>API Key</span>
              <input id="api-key" type="password" placeholder="sk-..." autocomplete="off" />
            </label>

            <label class="field">
              <span>Base URL</span>
              <input id="api-base-url" type="url" placeholder="https://api.deepseek.com/v1" />
            </label>

            <label class="field">
              <span>Model</span>
              <input id="model" type="text" placeholder="deepseek-chat" />
            </label>

            <label class="field">
              <span>Reasoning Effort</span>
              <select id="reasoning-effort">
                <option value="minimal">minimal</option>
                <option value="low">low</option>
                <option value="medium">medium</option>
                <option value="high">high</option>
              </select>
              <span id="reasoning-effort-hint" class="field-hint">
                仅在 `doubao-seed` 模型下生效；`minimal` 表示不思考。
              </span>
            </label>

            <label class="field">
              <span>接口模式</span>
              <select id="api-mode">
                <option value="chat_completions">Chat Completions API（推荐）</option>
                <option value="auto">自动兼容</option>
                <option value="responses">Responses API</option>
              </select>
            </label>
          </div>
        </section>

        <label class="checkbox-field">
          <input id="debug-enabled" type="checkbox" />
          <span>开启 Debug 模式，记录最近请求日志</span>
        </label>

        <button id="save-button" type="submit">保存配置</button>
        <p id="save-status" class="muted">配置会保存在浏览器本地存储中。</p>
      </form>

      <section id="metrics-panel" class="panel form-panel">
        <p class="label">性能指标</p>
        <p id="metrics-status" class="muted">这里会显示最近一次 AI 请求的性能指标。</p>
        <div id="metrics-grid" class="metrics-grid">
          <div class="metric-card">
            <span class="metric-label">首 token 延迟</span>
            <strong id="metric-first-token" class="metric-value">-</strong>
          </div>
          <div class="metric-card">
            <span class="metric-label">Token 速度</span>
            <strong id="metric-token-speed" class="metric-value">-</strong>
          </div>
          <div class="metric-card">
            <span class="metric-label">总耗时</span>
            <strong id="metric-total-latency" class="metric-value">-</strong>
          </div>
          <div class="metric-card">
            <span class="metric-label">Completion Tokens</span>
            <strong id="metric-completion-tokens" class="metric-value">-</strong>
          </div>
        </div>
        <p id="metrics-meta" class="muted">暂无请求记录</p>
      </section>

      <section id="debug-panel" class="panel form-panel">
        <p class="label">调试日志</p>
        <p id="debug-status" class="muted">开启 Debug 模式后，这里会显示最近的请求过程。</p>
        <div class="debug-actions">
          <button id="refresh-logs-button" class="secondary-button" type="button">刷新日志</button>
          <button id="clear-logs-button" class="secondary-button" type="button">清空日志</button>
        </div>
        <pre id="debug-log-output" class="debug-log-output">暂无日志</pre>
      </section>
    </main>

    <script src="./popup.js"></script>
  </body>
</html>
